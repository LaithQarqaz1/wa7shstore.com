        <h2 data-i18n="legal.privacy.title">سياسة الخصوصية</h2>
        <p class="legal-updated" data-i18n="legal.updated">آخر تحديث: 18 فبراير 2026</p>

        <h3 data-i18n="legal.privacy.scope.title">1) نطاق السياسة</h3>
        <p data-i18n="legal.privacy.scope.body">توضح هذه السياسة طريقة جمع واستخدام وحماية بيانات مستخدمي المتجر عبر الموقع والخدمات المرتبطة به.</p>

        <h3 data-i18n="legal.privacy.collect.title">2) البيانات التي نجمعها</h3>
        <ul>
          <li data-i18n="legal.privacy.collect.account">بيانات الحساب: الاسم، البريد الإلكتروني، رقم الهاتف، ومعرّفات تسجيل الدخول.</li>
          <li data-i18n="legal.privacy.collect.orders">بيانات الطلبات: الخدمة المطلوبة، حالة الطلب، تفاصيل الدفع اللازمة للتنفيذ والتوثيق.</li>
          <li data-i18n="legal.privacy.collect.tech">بيانات تقنية: نوع الجهاز، المتصفح، عنوان IP، وسجلات الاستخدام لتحسين الأداء والأمان.</li>
        </ul>

        <h3 data-i18n="legal.privacy.use.title">3) كيف نستخدم البيانات</h3>
        <ul>
          <li data-i18n="legal.privacy.use.orders">تنفيذ الطلبات وتقديم الدعم الفني.</li>
          <li data-i18n="legal.privacy.use.security">التحقق من الأمان ومنع الاحتيال وإساءة الاستخدام.</li>
          <li data-i18n="legal.privacy.use.notifications">إرسال الإشعارات المتعلقة بالحساب والطلبات والعروض (عند السماح بذلك).</li>
          <li data-i18n="legal.privacy.use.compliance">الامتثال للالتزامات القانونية والتنظيمية.</li>
        </ul>

        <h3 data-i18n="legal.privacy.share.title">4) مشاركة البيانات</h3>
        <p data-i18n="legal.privacy.share.body">لا يتم بيع بياناتك. قد تتم المشاركة فقط مع مزودي الدفع أو مزودي الخدمات التقنية أو الجهات الرسمية عند وجود سبب قانوني أو تشغيلي مشروع.</p>

        <h3 data-i18n="legal.privacy.protection.title">5) حماية البيانات</h3>
        <p data-i18n="legal.privacy.protection.body">نطبق إجراءات تنظيمية وتقنية معقولة لحماية البيانات. كما يلتزم المستخدم بالحفاظ على سرية كلمة المرور والرموز الأمنية وعدم مشاركتها.</p>

        <h3 data-i18n="legal.privacy.retention.title">6) الاحتفاظ بالبيانات</h3>
        <p data-i18n="legal.privacy.retention.body">يتم الاحتفاظ بالبيانات للمدة اللازمة لتقديم الخدمة، وتسوية النزاعات، والالتزام القانوني، ثم تُزال أو تُخفى هوية البيانات متى أمكن.</p>

        <h3 data-i18n="legal.privacy.rights.title">7) حقوق المستخدم</h3>
        <p data-i18n="legal.privacy.rights.body">يمكنك طلب تحديث بياناتك أو تصحيحها، وطلب حذفها ضمن الحدود النظامية وما لا يتعارض مع الالتزامات القانونية أو حقوق الطرفين في إثبات العمليات.</p>

        <h3 data-i18n="legal.privacy.cookies.title">8) ملفات الارتباط والتخزين المحلي</h3>
        <p data-i18n="legal.privacy.cookies.body">يستخدم الموقع التخزين المحلي وملفات تعريف الارتباط لتحسين تجربة الاستخدام، حفظ التفضيلات، واستمرارية الجلسة وعرض المحتوى بشكل أسرع.</p>

        <h3 data-i18n="legal.privacy.changes.title">9) التعديلات على السياسة</h3>
        <p data-i18n="legal.privacy.changes.body">قد يتم تحديث هذه السياسة عند تطوير الخدمات. استمرار الاستخدام بعد التحديث يعني الاطلاع والقبول بالإصدار الأحدث.</p>

        <p class="legal-note" data-i18n="legal.privacy.note">باستخدامك للموقع، فإنك توافق على هذه السياسة بما يضمن مصلحة المستخدم والمتجر ويحفظ حقوق الطرفين.</p>

        <h3 data-i18n="legal.terms.return.title">6) الإرجاع والاستبدال</h3>

          <li data-i18n="legal.terms.return.issue">في حال ثبوت خلل قابل للتحقق، يتم التعويض المناسب (إعادة التنفيذ أو الرصيد أو الاسترجاع) وفق تقييم الحالة.</li>
        </ul>

        <h3 data-i18n="legal.terms.disputes.title">7) النزاعات وعمليات الاعتراض</h3>
        <p data-i18n="legal.terms.disputes.body">أي اعتراض دفع غير مبرر أو إساءة استخدام قد يؤدي إلى تعليق الحساب مؤقتًا حتى اكتمال التحقق وحماية حقوق جميع الأطراف.</p>

        <h3 data-i18n="legal.terms.ip.title">9) الملكية الفكرية</h3>
