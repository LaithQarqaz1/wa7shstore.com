<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>إعادة ضبط كلمة المرور</title>
  <meta name="color-scheme" content="light dark">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800;900&display=swap" rel="stylesheet">
  <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"></noscript>
  <link rel="preload" href="header.css?v=20260318-1" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link href="header.css?v=20260318-1" rel="stylesheet"></noscript>
  <script src="site_settings.js?v=20260519-01" defer></script>
  <script src="site-bundle.js?v=20260519-07" defer></script>
  <style>
    :root{
      --site-accent-rgb:92,94,191;
      --site-accent-runtime:#5c5ebf;
      --site-accent-runtime-strong:#3b3e8c;
      --site-accent-runtime-light:#9c9ede;
    }

    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%}
    body{
      background:#070b12;
      color:#fff;
      font-family:'Cairo',sans-serif;
      direction:rtl;
      text-align:right;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background:
        radial-gradient(circle at 18% 18%, rgba(var(--site-accent-rgb), .14), transparent 22%),
        radial-gradient(circle at 82% 12%, rgba(var(--site-accent-rgb), .1), transparent 24%),
        linear-gradient(180deg, rgba(255,255,255,.014), rgba(255,255,255,0));
      opacity:.95;
    }

    #resetInline{
      --page-bg:#070b12;
      --surface:rgba(10,16,26,.88);
      --surface-2:rgba(10,16,26,.74);
      --text:#ffffff;
      --muted:rgba(255,255,255,.78);
      --placeholder:rgba(255,255,255,.62);
      --primary:var(--site-accent-runtime);
      --primary-2:var(--site-accent-runtime-strong);
      --danger:#ef4444;
      --success:#16a34a;
      --danger-text:#ffd5d5;
      --success-text:#d7ffe2;
      --field-bg:rgba(12,18,28,.62);
      --field-border:rgba(var(--site-accent-rgb), .24);
      --field-focus:rgba(var(--site-accent-rgb), .56);
      --field-focus-glow:rgba(var(--site-accent-rgb), .14);
      --card-border:rgba(var(--site-accent-rgb), .24);
      --card-shadow:0 18px 44px rgba(0,0,0,.36);
      --link:var(--site-accent-runtime-light);
      position:relative;
      z-index:1;
      min-height:calc(100vh - var(--app-header-offset, 88px));
    }

    html[data-theme="light"] body,
    body.light-mode{
      background:#f1f3f8;
      color:#1b2440;
    }

    html[data-theme="light"] body::before,
    body.light-mode::before{
      background:
        radial-gradient(circle at 18% 18%, rgba(var(--site-accent-rgb), .08), transparent 22%),
        radial-gradient(circle at 82% 12%, rgba(var(--site-accent-rgb), .05), transparent 24%),
        linear-gradient(180deg, rgba(255,255,255,.5), rgba(255,255,255,0));
      opacity:.9;
    }

    html[data-theme="light"] #resetInline,
    body.light-mode #resetInline{
      --page-bg:#f1f3f8;
      --surface:rgba(255,255,255,.94);
      --surface-2:rgba(247,249,255,.92);
      --text:#1b2440;
      --muted:rgba(27,36,64,.72);
      --placeholder:rgba(27,36,64,.5);
      --field-bg:rgba(255,255,255,.88);
      --field-border:rgba(var(--site-accent-rgb), .18);
      --field-focus:rgba(var(--site-accent-rgb), .42);
      --field-focus-glow:rgba(var(--site-accent-rgb), .14);
      --card-border:rgba(var(--site-accent-rgb), .18);
      --card-shadow:0 18px 44px rgba(24,34,64,.14);
      --link:var(--site-accent-runtime);
      --danger-text:#b42318;
      --success-text:#166534;
    }

    html[data-theme="dark"] #resetInline,
    body.dark-mode #resetInline{
      --page-bg:#070b12;
      --surface:rgba(10,16,26,.88);
      --surface-2:rgba(10,16,26,.74);
      --text:#ffffff;
      --muted:rgba(255,255,255,.78);
      --placeholder:rgba(255,255,255,.62);
      --field-bg:rgba(12,18,28,.62);
      --field-border:rgba(var(--site-accent-rgb), .24);
      --field-focus:rgba(var(--site-accent-rgb), .56);
      --field-focus-glow:rgba(var(--site-accent-rgb), .14);
      --card-border:rgba(var(--site-accent-rgb), .24);
      --card-shadow:0 18px 44px rgba(0,0,0,.36);
      --link:var(--site-accent-runtime-light);
      --danger-text:#ffd5d5;
      --success-text:#d7ffe2;
    }

    #resetInline .auth-page{
      min-height:calc(100vh - var(--app-header-offset, 88px));
      display:flex;
      align-items:center;
      justify-content:center;
      padding:18px 16px 24px;
    }

    #resetInline .auth-shell{
      width:min(92vw, 440px);
    }

    #resetInline .form-side{
      background:linear-gradient(180deg, var(--surface), var(--surface-2));
      border:1px solid var(--card-border);
      border-radius:26px;
      padding:22px 20px 20px;
      box-shadow:var(--card-shadow);
      backdrop-filter:blur(6px);
    }

    #resetInline .header--simple{
      text-align:center;
      margin-bottom:18px;
      text-shadow:none !important;
      filter:none !important;
      box-shadow:none !important;
    }

    #resetInline .eyebrow{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:6px 12px;
      margin-bottom:10px;
      border-radius:999px;
      color:var(--link);
      font-size:.82rem;
      font-weight:800;
      background:rgba(var(--site-accent-rgb), .12);
      border:1px solid rgba(var(--site-accent-rgb), .2);
    }

    #resetInline .eyebrow::before{
      content:"";
      width:7px;
      height:7px;
      border-radius:50%;
      background:currentColor;
      box-shadow:0 0 12px rgba(var(--site-accent-rgb), .5);
    }

    #resetInline .header--simple h2{
      margin:0 0 8px;
      font-size:1.45rem;
      font-weight:800;
      text-shadow:none !important;
      filter:none !important;
      box-shadow:none !important;
    }

    #resetInline .header--simple *,
    #resetInline .header--simple h2::before,
    #resetInline .header--simple h2::after{
      text-shadow:none !important;
      filter:none !important;
      box-shadow:none !important;
    }

    #resetInline .header--simple p{
      margin:0;
      color:var(--muted);
      line-height:1.9;
      font-size:.95rem;
    }

    #resetInline .card{
      width:100%;
      background:transparent;
      border:none;
      box-shadow:none;
      border-radius:0;
      padding:0;
      margin:0;
      display:block;
      text-align:right;
      direction:rtl;
    }

    #resetInline .login-box{
      width:100%;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    #resetInline .status-wrap{
      display:flex;
      justify-content:center;
      margin-bottom:8px;
    }

    #resetInline .status-pill{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:36px;
      padding:8px 14px;
      border-radius:999px;
      border:1px solid rgba(var(--site-accent-rgb), .26);
      background:rgba(var(--site-accent-rgb), .12);
      color:var(--text);
      font-size:.82rem;
      font-weight:800;
      text-align:center;
    }

    #resetInline .status-pill[data-tone="success"]{
      border-color:rgba(34,197,94,.24);
      background:rgba(34,197,94,.14);
      color:var(--success);
    }

    #resetInline .status-pill[data-tone="error"]{
      border-color:rgba(239,68,68,.24);
      background:rgba(239,68,68,.12);
      color:var(--danger);
    }

    #resetInline .account-chip{
      position:relative;
      min-height:50px;
      border-radius:999px;
      background:var(--field-bg);
      border:1px solid var(--field-border);
      padding:12px 60px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
    }

    #resetInline .account-chip > i{
      position:absolute;
      top:50%;
      transform:translateY(-50%);
      right:14px;
      width:34px;
      height:34px;
      border-radius:999px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:var(--field-bg);
      border:1px solid var(--field-border);
      color:var(--muted);
      opacity:.96;
    }

    #resetInline .account-chip strong{
      display:block;
      width:100%;
      font-size:1rem;
      word-break:break-word;
      line-height:1.45;
      text-align:center;
    }

    #resetInline .message{
      display:none;
      padding:12px 14px;
      border-radius:16px;
      line-height:1.9;
      font-size:.9rem;
      border:1px solid transparent;
    }

    #resetInline .message.show{display:block}
    #resetInline .message.error{
      color:var(--danger-text);
      background:rgba(239,68,68,.12);
      border-color:rgba(239,68,68,.2);
    }
    #resetInline .message.success{
      color:var(--success-text);
      background:rgba(22,163,74,.12);
      border-color:rgba(22,163,74,.22);
    }

    #resetInline .stack{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    #resetInline .input-group{
      position:relative;
    }

    #resetInline .input-group input{
      width:100%;
      height:48px;
      background:var(--field-bg);
      border:1px solid var(--field-border);
      border-radius:999px;
      padding:14px 42px;
      color:var(--text);
      font:inherit;
      font-weight:600;
      outline:none;
    }

    #resetInline .input-group input::placeholder{
      color:var(--placeholder);
      opacity:.72;
    }

    #resetInline .input-group input:focus{
      border-color:var(--field-focus);
      box-shadow:0 0 0 3px var(--field-focus-glow);
    }

    #resetInline .input-group > i{
      position:absolute;
      top:50%;
      transform:translateY(-50%);
      right:14px;
      width:18px;
      height:18px;
      display:flex;
      align-items:center;
      justify-content:center;
      color:var(--muted);
      opacity:.96;
      background:transparent;
      border:none;
      border-radius:0;
      box-shadow:none;
    }

    #resetInline .field-toggle{
      position:absolute;
      top:50%;
      left:14px;
      right:auto;
      transform:translateY(-50%);
      width:18px;
      min-width:18px;
      height:18px;
      border:none;
      border-radius:0;
      background:transparent;
      color:var(--muted);
      cursor:pointer;
      padding:0;
      display:flex;
      align-items:center;
      justify-content:center;
      appearance:none;
      -webkit-appearance:none;
      margin:0 !important;
      z-index:3;
      box-shadow:none !important;
      transition:border-color .18s ease, color .18s ease, background .18s ease, transform .18s ease;
    }

    #resetInline .field-toggle:hover{
      color:var(--primary);
      transform:translateY(-50%) !important;
    }

    #resetInline .field-toggle:focus{
      outline:none;
      color:var(--primary);
      box-shadow:none;
    }

    #resetInline .field-toggle:active{
      transform:translateY(-50%) scale(.98) !important;
    }

    #resetInline .field-toggle i{
      position:static !important;
      transform:none !important;
      inset:auto !important;
      width:auto !important;
      height:auto !important;
      border:none !important;
      background:transparent !important;
      box-shadow:none !important;
      border-radius:0 !important;
      pointer-events:none;
      font-size:.98rem;
      line-height:1;
    }

    #resetInline .sr-only-username{
      position:absolute !important;
      width:1px !important;
      height:1px !important;
      padding:0 !important;
      margin:-1px !important;
      overflow:hidden !important;
      clip:rect(0, 0, 0, 0) !important;
      clip-path:inset(50%) !important;
      white-space:nowrap !important;
      border:0 !important;
      opacity:0 !important;
      pointer-events:none !important;
    }

    #resetInline .field-label{
      margin:2px 0 -2px;
      font-size:.9rem;
      font-weight:700;
      color:var(--text);
    }

    #resetInline .meta-row{
      display:flex;
      align-items:center;
      justify-content:flex-start;
      gap:12px;
      flex-wrap:wrap;
      margin-top:2px;
    }

    #resetInline .hint{
      color:var(--muted);
      font-size:.8rem;
      line-height:1.8;
    }

    #resetInline .strength{
      font-size:.82rem;
      font-weight:800;
    }

    #resetInline .strength[data-level="weak"]{color:#ff7e7e}
    #resetInline .strength[data-level="medium"]{color:#ffd166}
    #resetInline .strength[data-level="strong"]{color:#7df1a4}

    #resetInline .btn{
      width:100%;
      height:48px;
      border:none;
      border-radius:999px;
      cursor:pointer;
      font-size:1rem;
      font-weight:700;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      text-decoration:none;
      font-family:'Cairo',sans-serif;
    }

    #resetInline .btn-primary{
      background:linear-gradient(135deg,var(--primary),var(--primary-2));
      color:#fff;
      border:1px solid rgba(var(--site-accent-rgb), .52);
      box-shadow:none;
      text-shadow:none;
      filter:none;
    }

    #resetInline .btn-primary:hover{
      filter:brightness(1.03);
      box-shadow:none;
    }

    #resetInline .btn-secondary{
      background:var(--field-bg);
      border:1px solid var(--field-border);
      color:var(--text);
    }

    #resetInline .hidden{display:none!important}

    html[data-theme="light"] #resetInline .form-side,
    body.light-mode #resetInline .form-side{
      background:linear-gradient(180deg, rgba(255,255,255,.95), rgba(247,249,255,.92));
      border-color:rgba(var(--site-accent-rgb), .18);
      box-shadow:0 18px 44px rgba(24,34,64,.14);
    }

    html[data-theme="light"] #resetInline .account-chip,
    html[data-theme="light"] #resetInline .input-group input,
    html[data-theme="light"] #resetInline .input-group i,
    html[data-theme="light"] #resetInline .btn-secondary,
    body.light-mode #resetInline .account-chip,
    body.light-mode #resetInline .input-group input,
    body.light-mode #resetInline .input-group i,
    body.light-mode #resetInline .btn-secondary{
      background:rgba(255,255,255,.88);
      border-color:rgba(var(--site-accent-rgb), .18);
      color:var(--text);
    }

    html[data-theme="light"] #resetInline .status-pill,
    body.light-mode #resetInline .status-pill{
      background:rgba(var(--site-accent-rgb), .09);
      border-color:rgba(var(--site-accent-rgb), .18);
      color:var(--text);
    }

    html[data-theme="light"] #resetInline .message.error,
    body.light-mode #resetInline .message.error{
      background:rgba(239,68,68,.08);
      border-color:rgba(239,68,68,.18);
    }

    html[data-theme="light"] #resetInline .message.success,
    body.light-mode #resetInline .message.success{
      background:rgba(22,163,74,.08);
      border-color:rgba(22,163,74,.16);
    }

    @media (max-width: 640px){
      #resetInline .auth-page{padding:14px 12px 18px;min-height:calc(100vh - var(--app-header-offset, 82px))}
      #resetInline .auth-shell{width:min(94vw, 440px)}
      #resetInline .form-side{padding:18px 16px 18px}
      #resetInline .header--simple h2{font-size:1.3rem}
      #resetInline .input-group input{padding-inline:42px}
    }
  </style>
</head>
<body>
  <div id="headerContainer"></div>
  <div id="sidebarContainer"></div>

  <main id="resetInline">
    <div class="auth-page">
      <div class="auth-shell">
        <section class="form-side">
          <header class="header header--simple">
            <h2>تغيير كلمة المرور</h2>
          </header>

          <div class="card">
            <div class="status-wrap" id="statusWrap">
              <span class="status-pill" id="statusBadge" data-tone="loading">جاري التحقق من الرابط...</span>
            </div>

            <div class="login-box">
              <div class="account-chip hidden" id="emailChip">
                <i class="fa-regular fa-envelope"></i>
                <strong id="emailValue">...</strong>
              </div>

              <div class="message error" id="errorBox"></div>
              <div class="message success" id="successBox"></div>

              <form id="resetForm" class="stack hidden" novalidate>
                <input id="resetEmailHidden" class="sr-only-username" type="email" name="username" autocomplete="username email">
                <label class="field-label" for="newPassword">كلمة المرور الجديدة</label>
                <div class="input-group">
                  <input id="newPassword" name="newPassword" type="password" autocomplete="new-password" placeholder="أدخل كلمة المرور الجديدة">
                  <i class="fa-solid fa-lock"></i>
                  <button class="field-toggle" type="button" data-toggle-target="newPassword" aria-label="إظهار كلمة المرور" title="إظهار كلمة المرور" aria-pressed="false"><i class="fa-regular fa-eye"></i></button>
                </div>

                <div class="input-group">
                  <input id="confirmPassword" name="confirmPassword" type="password" autocomplete="new-password" placeholder="أعد كتابة كلمة المرور">
                  <i class="fa-solid fa-shield-halved"></i>
                  <button class="field-toggle" type="button" data-toggle-target="confirmPassword" aria-label="إظهار كلمة المرور" title="إظهار كلمة المرور" aria-pressed="false"><i class="fa-regular fa-eye"></i></button>
                </div>

                <div class="meta-row">
                  <span class="strength" id="strengthText" data-level="weak">قوة كلمة المرور: ضعيفة</span>
                </div>

                <div class="stack">
                  <button class="btn btn-primary" id="submitBtn" type="submit">حفظ كلمة المرور الجديدة</button>
                  <button class="btn btn-secondary" id="backLoginBtn" type="button">العودة لتسجيل الدخول</button>
                </div>
              </form>

              <div class="stack hidden" id="successActions">
                <button class="btn btn-primary" id="successLoginBtn" type="button">الانتقال إلى تسجيل الدخول</button>
                <a class="btn btn-secondary hidden" id="continueBtn" href="#">فتح الصفحة التالية</a>
              </div>
            </div>
          </div>
        </section>
      </div>
    </div>
  </main>

  <script>
    (function () {
      "use strict";

      const DEFAULT_FIREBASE_CONFIG = window.__getSiteFirebaseConfig
        ? window.__getSiteFirebaseConfig()
        : (window.__FIREBASE_CONFIG__ || {});

      const els = {
        statusWrap: document.getElementById("statusWrap"),
        statusBadge: document.getElementById("statusBadge"),
        modeLabel: document.getElementById("modeLabel"),
        cardSubtitle: document.getElementById("cardSubtitle"),
        errorBox: document.getElementById("errorBox"),
        successBox: document.getElementById("successBox"),
        emailChip: document.getElementById("emailChip"),
        emailValue: document.getElementById("emailValue"),
        resetEmailHidden: document.getElementById("resetEmailHidden"),
        resetForm: document.getElementById("resetForm"),
        newPassword: document.getElementById("newPassword"),
        confirmPassword: document.getElementById("confirmPassword"),
        submitBtn: document.getElementById("submitBtn"),
        backLoginBtn: document.getElementById("backLoginBtn"),
        strengthText: document.getElementById("strengthText"),
        successActions: document.getElementById("successActions"),
        successLoginBtn: document.getElementById("successLoginBtn"),
        continueBtn: document.getElementById("continueBtn")
      };

      const params = new URLSearchParams(window.location.search || "");
      const state = {
        mode: String(params.get("mode") || "").trim(),
        oobCode: String(params.get("oobCode") || "").trim(),
        lang: String(params.get("lang") || "ar").trim() || "ar",
        continueUrl: sanitizeContinueUrl(params.get("continueUrl") || ""),
        auth: null,
        email: ""
      };

      function buildPreferredAppBase() {
        const authDomain = String(DEFAULT_FIREBASE_CONFIG.authDomain || "").trim();
        if (authDomain) return "https://" + authDomain;
        return window.location.origin;
      }

      function buildLoginUrl() {
        return "index.html#/login";
      }

      function redirectToLogin() {
        try {
          if (typeof window.navigateHomeHash === "function") {
            window.navigateHomeHash("#/login", "login");
            return;
          }
        } catch (_) {}
        const target = buildLoginUrl();
        try {
          window.location.replace(target);
          return;
        } catch (_) {}
        try {
          window.location.href = target;
          return;
        } catch (_) {}
        try {
          window.location.pathname = "/index.html";
          window.location.hash = "#/login";
        } catch (_) {}
      }

      function sanitizeContinueUrl(raw) {
        const text = String(raw || "").trim();
        if (!text) return "";
        try {
          const url = new URL(text, buildPreferredAppBase());
          if (!/^https?:$/i.test(url.protocol)) return "";
          const allowedHosts = new Set([
            String(window.location.hostname || "").trim().toLowerCase(),
            String(DEFAULT_FIREBASE_CONFIG.authDomain || "").trim().toLowerCase()
          ]);
          if (!allowedHosts.has(String(url.hostname || "").trim().toLowerCase())) return "";
          return url.toString();
        } catch (_) {
          return "";
        }
      }

      function setStatus(text, tone) {
        if (!els.statusBadge) return;
        const hasText = !!String(text || "").trim();
        if (els.statusWrap) els.statusWrap.classList.toggle("hidden", !hasText);
        els.statusBadge.textContent = hasText ? text : "";
        els.statusBadge.dataset.tone = tone || "loading";
      }

      function loadScriptOnce(src) {
        return new Promise(function (resolve, reject) {
          const url = String(src || "").trim();
          if (!url) {
            reject(new Error("script_src_missing"));
            return;
          }
          const existing = Array.from(document.scripts || []).find(function (node) {
            return String(node.src || "").trim() === url;
          });
          if (existing) {
            if (existing.dataset.loaded === "1") {
              resolve();
              return;
            }
            existing.addEventListener("load", function () { resolve(); }, { once: true });
            existing.addEventListener("error", function () { reject(new Error("script_load_failed")); }, { once: true });
            return;
          }
          const script = document.createElement("script");
          script.src = url;
          script.async = false;
          script.onload = function () {
            script.dataset.loaded = "1";
            resolve();
          };
          script.onerror = function () {
            reject(new Error("script_load_failed"));
          };
          document.head.appendChild(script);
        });
      }

      function waitForScriptNode(node) {
        return new Promise(function (resolve, reject) {
          if (!node) {
            resolve();
            return;
          }
          const readyState = String(node.readyState || "").toLowerCase();
          if (node.dataset.loaded === "1" || readyState === "loaded" || readyState === "complete") {
            resolve();
            return;
          }
          node.addEventListener("load", function () {
            try { node.dataset.loaded = "1"; } catch (_) {}
            resolve();
          }, { once: true });
          node.addEventListener("error", function () {
            reject(new Error("script_load_failed"));
          }, { once: true });
        });
      }

      async function waitForExistingFirebaseCompat() {
        const matches = Array.from(document.scripts || []).filter(function (node) {
          const src = String(node.src || "").trim();
          return /firebase-app-compat\.js|firebase-auth-compat\.js/i.test(src);
        });
        if (!matches.length) return false;
        await Promise.all(matches.map(waitForScriptNode)).catch(function () {});
        return true;
      }

      async function ensureFirebaseAuthCompat() {
        if (window.firebase && typeof firebase.auth === "function") return window.firebase;
        await waitForExistingFirebaseCompat();
        if (window.firebase && typeof firebase.auth === "function") return window.firebase;
        await loadScriptOnce("https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js");
        if (window.firebase && typeof firebase.auth === "function") return window.firebase;
        await loadScriptOnce("https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js");
        if (window.firebase && typeof firebase.auth === "function") return window.firebase;
        throw new Error("firebase_sdk_missing");
      }

      function setBusy(busy) {
        if (!els.submitBtn) return;
        els.submitBtn.disabled = !!busy;
        els.submitBtn.textContent = busy ? "جارٍ الحفظ..." : "حفظ كلمة المرور الجديدة";
      }

      function showMessage(el, text, type) {
        if (!el) return;
        el.textContent = text || "";
        el.className = "message " + (type || "error") + (text ? " show" : "");
      }

      function clearMessages() {
        showMessage(els.errorBox, "", "error");
        showMessage(els.successBox, "", "success");
      }

      function normalizeFirebaseError(err) {
        const direct = String((err && err.code) || "").trim();
        if (direct) return direct.toLowerCase();
        const message = String((err && err.message) || "").trim().toLowerCase();
        if (message.includes("expired-action-code")) return "auth/expired-action-code";
        if (message.includes("invalid-action-code")) return "auth/invalid-action-code";
        if (message.includes("weak-password")) return "auth/weak-password";
        if (message.includes("network-request-failed")) return "auth/network-request-failed";
        return message || "unknown";
      }

      function translateActionError(err) {
        const code = normalizeFirebaseError(err);
        if (code === "auth/expired-action-code") return "انتهت صلاحية رابط إعادة ضبط كلمة المرور. اطلب رابطًا جديدًا من صفحة الدخول.";
        if (code === "auth/invalid-action-code") return "رابط إعادة ضبط كلمة المرور غير صالح أو تم استخدامه مسبقًا.";
        if (code === "auth/user-disabled") return "هذا الحساب معطل حاليًا. تواصل مع الدعم إذا كنت ترى أن هذا خطأ.";
        if (code === "auth/weak-password") return "كلمة المرور الجديدة ضعيفة جدًا. استخدم 6 أحرف على الأقل.";
        if (code === "auth/network-request-failed") return "تعذر الاتصال بالخادم الآن. تحقق من الإنترنت ثم أعد المحاولة.";
        return "تعذر إكمال العملية الآن. جرّب مرة أخرى أو اطلب رابط استعادة جديدًا.";
      }

      function computeStrength(password) {
        const value = String(password || "");
        let score = 0;
        if (value.length >= 6) score += 1;
        if (value.length >= 10) score += 1;
        if (/[A-Z]/.test(value) || /[\u0600-\u06FF]/.test(value)) score += 1;
        if (/\d/.test(value)) score += 1;
        if (/[^A-Za-z0-9\u0600-\u06FF]/.test(value)) score += 1;
        if (score <= 2) return { label: "ضعيفة", level: "weak" };
        if (score <= 4) return { label: "متوسطة", level: "medium" };
        return { label: "قوية", level: "strong" };
      }

      function updateStrength() {
        if (!els.strengthText || !els.newPassword) return;
        const strength = computeStrength(els.newPassword.value);
        els.strengthText.textContent = "قوة كلمة المرور: " + strength.label;
        els.strengthText.dataset.level = strength.level;
      }

      function validatePasswords() {
        const password = String((els.newPassword && els.newPassword.value) || "");
        const confirm = String((els.confirmPassword && els.confirmPassword.value) || "");
        if (!password.trim()) return "أدخل كلمة المرور الجديدة أولًا.";
        if (password.length < 6) return "يجب ألا تقل كلمة المرور عن 6 أحرف.";
        if (!confirm.trim()) return "أعد كتابة كلمة المرور للتأكيد.";
        if (password !== confirm) return "كلمتا المرور غير متطابقتين.";
        return "";
      }

      function revealReadyState(email) {
        state.email = email || "";
        if (els.emailChip) els.emailChip.classList.remove("hidden");
        if (els.emailValue) els.emailValue.textContent = state.email || "غير معروف";
        if (els.resetEmailHidden) els.resetEmailHidden.value = state.email || "";
        if (els.resetForm) els.resetForm.classList.remove("hidden");
        if (els.cardSubtitle) {
          els.cardSubtitle.textContent = "أدخل كلمة المرور الجديدة ثم احفظها مباشرة. بعد النجاح يمكنك الرجوع إلى تسجيل الدخول.";
        }
        setStatus("", "success");
      }

      function revealSuccess() {
        if (els.resetForm) els.resetForm.classList.add("hidden");
        if (els.successActions) els.successActions.classList.remove("hidden");
        if (els.continueBtn) {
          if (state.continueUrl) {
            els.continueBtn.href = state.continueUrl;
            els.continueBtn.classList.remove("hidden");
          } else {
            els.continueBtn.classList.add("hidden");
          }
        }
      }

      function initFirebaseAuth() {
        const apiKey = String(params.get("apiKey") || DEFAULT_FIREBASE_CONFIG.apiKey || "").trim();
        const config = { ...DEFAULT_FIREBASE_CONFIG, apiKey: apiKey || DEFAULT_FIREBASE_CONFIG.apiKey };
        if (!window.firebase || !firebase.initializeApp || !firebase.auth) throw new Error("firebase_sdk_missing");
        if (!firebase.apps || !firebase.apps.length) firebase.initializeApp(config);
        const auth = firebase.auth();
        try { auth.languageCode = state.lang || "ar"; } catch (_) {}
        return auth;
      }

      async function boot() {
        clearMessages();
        if (els.modeLabel) els.modeLabel.textContent = "إعادة ضبط كلمة المرور";

        if (!state.mode || state.mode !== "resetPassword") {
          setStatus("رابط غير مدعوم", "error");
          if (els.cardSubtitle) els.cardSubtitle.textContent = "هذه الصفحة مخصصة فقط لروابط إعادة ضبط كلمة المرور.";
          return;
        }

        if (!state.oobCode) {
          setStatus("الرابط ناقص", "error");
          showMessage(els.errorBox, "رمز التحقق غير موجود داخل الرابط. اطلب رسالة جديدة من صفحة الدخول.", "error");
          return;
        }

        try {
          await ensureFirebaseAuthCompat();
          state.auth = initFirebaseAuth();
        } catch (_) {
          setStatus("تعذر تهيئة الصفحة", "error");
          showMessage(els.errorBox, "تعذر تحميل خدمة المصادقة الآن. أعد المحاولة بعد قليل.", "error");
          return;
        }

        setStatus("جاري التحقق من الرابط...", "loading");
        try {
          const email = await state.auth.verifyPasswordResetCode(state.oobCode);
          revealReadyState(email);
          if (els.newPassword) {
            setTimeout(function () {
              try { els.newPassword.focus(); } catch (_) {}
            }, 60);
          }
        } catch (err) {
          setStatus("الرابط غير صالح", "error");
          showMessage(els.errorBox, translateActionError(err), "error");
        }
      }

      async function submitReset(event) {
        event.preventDefault();
        clearMessages();
        const validationMessage = validatePasswords();
        if (validationMessage) {
          showMessage(els.errorBox, validationMessage, "error");
          return;
        }
        setBusy(true);
        setStatus("جارٍ تحديث كلمة المرور...", "loading");
        try {
          await state.auth.confirmPasswordReset(state.oobCode, String(els.newPassword.value || ""));
          setStatus("تم حفظ كلمة المرور", "success");
          showMessage(els.successBox, "تم تغيير كلمة المرور بنجاح. يمكنك الآن تسجيل الدخول بالكلمة الجديدة.", "success");
          revealSuccess();
        } catch (err) {
          setStatus("تعذر الحفظ", "error");
          showMessage(els.errorBox, translateActionError(err), "error");
        } finally {
          setBusy(false);
        }
      }

      document.querySelectorAll("[data-toggle-target]").forEach(function (button) {
        button.addEventListener("click", function () {
          const targetId = String(button.getAttribute("data-toggle-target") || "").trim();
          const input = targetId ? document.getElementById(targetId) : null;
          if (!input) return;
          const nextType = input.type === "password" ? "text" : "password";
          input.type = nextType;
          const icon = button.querySelector("i");
          const isHidden = nextType === "password";
          button.setAttribute("aria-pressed", isHidden ? "false" : "true");
          button.setAttribute("aria-label", isHidden ? "إظهار كلمة المرور" : "إخفاء كلمة المرور");
          button.setAttribute("title", isHidden ? "إظهار كلمة المرور" : "إخفاء كلمة المرور");
          if (icon) {
            icon.className = isHidden ? "fa-regular fa-eye" : "fa-regular fa-eye-slash";
          }
        });
      });

      if (els.newPassword) els.newPassword.addEventListener("input", updateStrength);
      if (els.resetForm) els.resetForm.addEventListener("submit", submitReset);

      function startPage() {
        updateStrength();
        boot();
      }

      if (els.backLoginBtn) {
        els.backLoginBtn.addEventListener("click", redirectToLogin);
      }
      if (els.successLoginBtn) {
        els.successLoginBtn.addEventListener("click", redirectToLogin);
      }

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", startPage, { once: true });
      } else {
        setTimeout(startPage, 0);
      }
    })();
  </script>
</body>
</html>
